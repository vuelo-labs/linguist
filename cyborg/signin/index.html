<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Cyborg</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    :root { --c-mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace; }
    body { background: var(--w-bg); color: var(--w-text); font-family: var(--sans, 'Inter', sans-serif); margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
    .wrap { max-width: 460px; margin: 0 auto; padding: 64px 24px 48px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    h1 { font-family: var(--serif, 'Newsreader', serif); font-size: 2rem; line-height: 1.15; margin: 0 0 8px; font-weight: 500; letter-spacing: -0.01em; }
    .lede { color: var(--w-muted); margin-bottom: 32px; font-size: 0.95rem; line-height: 1.55; }
    .card { background: var(--w-bg-card); border: 1px solid var(--w-border); border-radius: 14px; padding: 28px 28px 24px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--w-faint); margin-bottom: 6px; letter-spacing: 0.02em; text-transform: uppercase; }
    input[type=email] { width: 100%; box-sizing: border-box; background: var(--w-bg-input); border: 1px solid var(--w-border); border-radius: 9px; padding: 11px 14px; font-size: 0.95rem; color: var(--w-text); font-family: inherit; transition: border-color 0.1s; }
    input:focus { outline: none; border-color: var(--w-border-focus); }
    .btn { background: var(--w-accent); color: var(--w-bg); border: none; border-radius: 9px; padding: 11px 22px; font-size: 0.95rem; font-weight: 500; font-family: inherit; cursor: pointer; transition: opacity 0.1s; width: 100%; margin-top: 14px; }
    .btn:hover:not(:disabled) { opacity: 0.88; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .status { margin-top: 14px; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; line-height: 1.5; display: none; }
    .status.ok { background: #ecf3eb; border: 1px solid #b8d2b3; color: #2d5a26; display: block; }
    .status.err { background: #fbe9e7; border: 1px solid #e8b8af; color: #6e2618; display: block; }
    .btn-google { width: 100%; background: var(--w-bg-card); color: var(--w-text); border: 1px solid var(--w-border); border-radius: 9px; padding: 11px 18px; font-size: 0.95rem; font-weight: 500; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.1s, border-color 0.1s; }
    .btn-google:hover:not(:disabled) { background: var(--w-bg-input); border-color: var(--w-border-focus); }
    .btn-google:disabled { opacity: 0.4; cursor: default; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: var(--w-faint); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--w-border); }
    .footer { font-size: 0.86rem; color: var(--w-faint); text-align: center; padding: 20px 24px 32px; }
    .footer a { color: var(--w-accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="wrap">
  <h1>Sign in to Cyborg</h1>
  <p class="lede">Enter your email and we'll send you a one-time sign-in link. No password needed.</p>

  <div class="card">
    <button type="button" class="btn-google" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.12-.84 2.07-1.79 2.71v2.26h2.9c1.7-1.56 2.69-3.86 2.69-6.61z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.9-2.26c-.81.54-1.83.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.34A9 9 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.66 9c0-.59.1-1.17.29-1.7V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l2.99-2.34z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.34l2.58-2.58C13.46.89 11.42 0 9 0A9 9 0 0 0 .96 4.96L3.95 7.3C4.66 5.18 6.65 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or</span></div>

    <form id="signin-form" autocomplete="on">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required maxlength="320" autocomplete="email" placeholder="you@company.com" />

      <button type="submit" class="btn" id="submit-btn">Email me a sign-in link</button>

      <div class="status" id="status"></div>
    </form>
  </div>
</div>

<div class="footer">
  Not signed up yet? <a href="/cyborg/signup/">Create an account</a><br />
  Looking for the candidate assessment? <a href="/cyborg/">Cyborg home</a>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(
    'https://odnzrykfmfgdfybnmcfd.supabase.co',
    'sb_publishable_Czk4cQMbG_EcQdYgf23fZQ_Og6uDUyo',
  );

  // If they're already signed in, send them straight to the app.
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const next = new URLSearchParams(location.search).get('next') || '/cyborg/app/';
    location.replace(next);
  }

  const form   = document.getElementById('signin-form');
  const btn    = document.getElementById('submit-btn');
  const status = document.getElementById('status');

  document.getElementById('google-btn').addEventListener('click', async () => {
    document.getElementById('google-btn').disabled = true;
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: `${location.origin}/cyborg/auth/callback/`,
      },
    });
    if (error) {
      document.getElementById('google-btn').disabled = false;
      status.className = 'status err';
      status.textContent = error.message || 'Could not start Google sign-in. Try again.';
    }
    // On success the browser redirects to Google's consent screen; no local change needed.
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    status.className = 'status'; status.textContent = '';
    btn.disabled = true; btn.textContent = 'Sending…';

    const email = document.getElementById('email').value.trim();
    if (!email) {
      status.className = 'status err'; status.textContent = 'Enter your email.';
      btn.disabled = false; btn.textContent = 'Email me a sign-in link';
      return;
    }

    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: {
        // After clicking the magic link, the user is sent here. The auth
        // callback page persists the session into a cookie and redirects to
        // the app shell.
        emailRedirectTo: `${location.origin}/cyborg/auth/callback/`,
        // Don't create new users from sign-in; only existing users.
        // Sign-up has its own flow at /cyborg/signup/.
        shouldCreateUser: false,
      },
    });

    if (error) {
      status.className = 'status err';
      status.textContent = error.message?.includes('not allowed')
        ? "No account found for that email. Try signing up instead."
        : (error.message || 'Could not send the sign-in link. Try again.');
      btn.disabled = false; btn.textContent = 'Email me a sign-in link';
      return;
    }

    status.className = 'status ok';
    status.innerHTML = `Check <strong>${email}</strong> for your sign-in link. It expires in 1 hour.`;
    btn.textContent = 'Sent';
  });
</script>

</body>
</html>
