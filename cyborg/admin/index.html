<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyborg admin</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    :root { --c-mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace; }
    body { background: var(--w-bg); color: var(--w-text); font-family: var(--sans, 'Inter', sans-serif); margin: 0; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
    h1 { font-family: var(--serif, 'Newsreader', serif); font-size: 1.8rem; margin: 0 0 6px; font-weight: 500; }
    .lede { color: var(--w-muted); margin-bottom: 28px; font-size: 0.95rem; }
    .card { background: var(--w-bg-card); border: 1px solid var(--w-border); border-radius: 12px; padding: 22px 24px; margin: 16px 0; }
    .card h2 { font-family: var(--serif, 'Newsreader', serif); font-size: 1.15rem; margin: 0 0 14px; font-weight: 500; }
    label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--w-faint); margin-bottom: 5px; letter-spacing: 0.02em; text-transform: uppercase; }
    input[type=text], input[type=password], input[type=number], textarea {
      width: 100%; box-sizing: border-box;
      background: var(--w-bg-input); border: 1px solid var(--w-border);
      border-radius: 8px; padding: 9px 12px; font-size: 0.92rem;
      color: var(--w-text); font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--w-border-focus); }
    .field { margin-bottom: 12px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row .field { flex: 1 1 200px; margin-bottom: 0; }
    .btn {
      background: var(--w-accent); color: var(--w-bg);
      border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 0.9rem; font-weight: 500;
      font-family: inherit; cursor: pointer;
    }
    .btn:hover:not(:disabled) { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn.danger { background: #6e2618; }
    .btn.small { padding: 5px 11px; font-size: 0.82rem; }
    .btn.ghost { background: transparent; color: var(--w-muted); border: 1px solid var(--w-border); }
    .status { margin-top: 12px; padding: 9px 12px; border-radius: 7px; font-size: 0.88rem; display: none; }
    .status.ok { background: #ecf3eb; border: 1px solid #b8d2b3; color: #2d5a26; display: block; }
    .status.err { background: #fbe9e7; border: 1px solid #e8b8af; color: #6e2618; display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--w-border); vertical-align: top; }
    th { font-weight: 600; color: var(--w-faint); font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.03em; }
    td.mono { font-family: var(--c-mono); font-size: 0.82rem; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 11px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; }
    .pill.active   { background: #ecf3eb; color: #2d5a26; }
    .pill.pending  { background: #fdf6e3; color: #6b5022; }
    .pill.used     { background: var(--w-accent-light); color: var(--w-muted); }
    .pill.revoked  { background: #fbe9e7; color: #6e2618; }
    .pill.expired  { background: #efeae1; color: var(--w-faint); }
    .install-cmd { font-family: var(--c-mono); font-size: 0.82rem; background: #1f1c19; color: #f5f0e6; padding: 10px 12px; border-radius: 7px; margin-top: 10px; overflow-x: auto; white-space: pre; }
    .toolbar { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .toolbar .grow { flex: 1; }
    .empty { text-align: center; padding: 32px; color: var(--w-faint); font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="wrap">

  <h1>Cyborg admin</h1>
  <p class="lede">Mint, revoke, and audit candidate tokens. Auth via Cloudflare Access — your email login is the gate.</p>

  <!-- Mint -->
  <div class="card" id="mint-card">
    <h2>Mint a token</h2>
    <div class="row">
      <div class="field">
        <label for="m-label">Label (name + email)</label>
        <input type="text" id="m-label" placeholder="Alex Doe (alex@example.com)" />
      </div>
      <div class="field" style="flex:0 0 130px;">
        <label for="m-days">Days valid</label>
        <input type="number" id="m-days" value="8" min="1" max="30" />
      </div>
    </div>
    <div class="field">
      <label for="m-notes">Notes (optional)</label>
      <input type="text" id="m-notes" placeholder="e.g. internal pilot, friendly dry-run" />
    </div>
    <button class="btn" onclick="mintToken()">Mint</button>
    <div class="status" id="mint-status"></div>
    <div id="mint-result"></div>
  </div>

  <!-- List -->
  <div class="card" id="list-card">
    <div class="toolbar">
      <h2 style="margin:0;">Tokens</h2>
      <div>
        <button class="btn ghost small" onclick="loadTokens()">Refresh</button>
        <a class="btn ghost small" href="/cdn-cgi/access/logout" style="text-decoration:none;display:inline-block;">Sign out</a>
      </div>
    </div>
    <div id="list-status" class="status"></div>
    <div id="list-body"></div>
  </div>

  <!-- Scored sessions -->
  <div class="card" id="reports-card">
    <div class="toolbar">
      <h2 style="margin:0;">Scored sessions</h2>
      <button class="btn ghost small" onclick="loadReports()">Refresh</button>
    </div>
    <div id="reports-status" class="status"></div>
    <div id="reports-body"></div>
  </div>

</div>

<!-- Report viewer modal -->
<div id="report-modal" class="rm-overlay hidden" onclick="closeReportModal(event)">
  <div class="rm-frame" onclick="event.stopPropagation()">
    <div class="rm-bar">
      <div class="rm-tabs" id="rm-tabs">
        <button class="rm-tab" data-tier="candidate" onclick="switchTier('candidate')">candidate</button>
        <button class="rm-tab" data-tier="manager"   onclick="switchTier('manager')">manager</button>
        <button class="rm-tab" data-tier="technical" onclick="switchTier('technical')">technical</button>
        <button class="rm-tab" data-tier="recruiter" onclick="switchTier('recruiter')">recruiter</button>
        <button class="rm-tab" data-tier="master"    onclick="switchTier('master')">master</button>
      </div>
      <div class="rm-meta" id="rm-meta"></div>
      <button class="rm-close" onclick="closeReportModal()" aria-label="Close">×</button>
    </div>
    <iframe id="rm-iframe" sandbox="allow-same-origin"></iframe>
  </div>
</div>

<style>
  .verdict-pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 0.78rem; font-weight: 600;
  }
  .verdict-pill.shortlist  { background: #e3fcef; color: #006644; }
  .verdict-pill.borderline { background: #fff4e5; color: #974f0c; }
  .verdict-pill.pass       { background: #ffebe6; color: #bf2600; }
  .report-links a, .report-links button.tier-link {
    display: inline-block; margin-right: 8px; font-size: 0.82rem;
    color: var(--w-text); text-decoration: none; border-bottom: 1px dotted var(--w-muted);
    background: none; border-top: none; border-left: none; border-right: none;
    cursor: pointer; padding: 0; font-family: inherit;
  }
  .report-links a:hover, .report-links button.tier-link:hover { color: var(--w-border-focus); }
  .headline-snippet { color: var(--w-muted); font-size: 0.82rem; font-style: italic; }

  /* Report viewer modal */
  .rm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    padding: 28px; z-index: 1000;
  }
  .rm-overlay.hidden { display: none; }
  .rm-frame {
    background: var(--w-bg, #fff);
    width: 100%; max-width: 980px; height: 100%; max-height: 92vh;
    border-radius: 10px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }
  .rm-bar {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 14px; border-bottom: 1px solid var(--w-border, #eee);
    background: var(--w-bg-card, #f7f6f3);
  }
  .rm-tabs { display: flex; gap: 4px; }
  .rm-tab {
    background: transparent; border: 1px solid transparent;
    padding: 5px 12px; border-radius: 6px;
    font-size: 0.82rem; font-family: inherit; cursor: pointer;
    color: var(--w-muted, #666);
  }
  .rm-tab:hover { background: var(--w-bg-input, #fff); color: var(--w-text); }
  .rm-tab.active {
    background: var(--w-bg-input, #fff); border-color: var(--w-border, #ddd);
    color: var(--w-text); font-weight: 600;
  }
  .rm-meta {
    flex: 1; text-align: right; font-size: 0.78rem; color: var(--w-muted);
    font-family: var(--c-mono);
  }
  .rm-close {
    background: none; border: none; font-size: 1.6rem;
    color: var(--w-muted); cursor: pointer; line-height: 1; padding: 0 4px;
  }
  .rm-close:hover { color: var(--w-text); }
  #rm-iframe {
    flex: 1; width: 100%; border: none; background: #fff;
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
  loadTokens();
  loadReports();
});

async function api(path, opts = {}) {
  return fetch(path, {
    ...opts,
    credentials: 'same-origin',
    headers: {
      ...(opts.headers || {}),
      ...(opts.body ? { 'Content-Type': 'application/json' } : {}),
    },
  });
}

async function mintToken() {
  const label = document.getElementById('m-label').value.trim();
  const days  = parseInt(document.getElementById('m-days').value, 10) || 8;
  const notes = document.getElementById('m-notes').value.trim();
  const status = document.getElementById('mint-status');
  const result = document.getElementById('mint-result');
  status.className = 'status'; status.textContent = '';
  result.innerHTML = '';

  const r = await api('/cyborg/mint', {
    method: 'POST',
    body: JSON.stringify({ label: label || null, days, notes: notes || null }),
  });
  const d = await r.json();
  if (!r.ok || !d.ok) {
    status.className = 'status err';
    status.textContent = d.error || `Error (${r.status}).`;
    return;
  }

  status.className = 'status ok';
  status.textContent = 'Minted.';
  result.innerHTML = `
    <div class="install-cmd">${escapeHtml(d.install_cmd)}</div>
    <p style="font-size:0.84rem;color:var(--w-muted);margin-top:8px;">
      Token: <code>${escapeHtml(d.token)}</code> — expires ${new Date(d.expires_at).toLocaleString('en-GB')}.
    </p>
  `;
  document.getElementById('m-label').value = '';
  document.getElementById('m-notes').value = '';
  loadTokens();
}

async function loadTokens() {
  const r = await api('/cyborg/list', { method: 'GET' });
  if (r.status === 200) renderTokens(await r.json());
  else if (r.status === 401) location.reload();   // Access cookie expired → trigger re-auth
}

function tokenStatus(t) {
  const now = Date.now();
  if (t.revoked_at) return 'revoked';
  if (t.used_at)    return 'used';
  if (!t.approved_at) return 'pending';
  if (new Date(t.expires_at).getTime() < now) return 'expired';
  return 'active';
}

function renderTokens(payload) {
  const tokens = (payload && payload.tokens) || [];
  const body = document.getElementById('list-body');
  if (tokens.length === 0) {
    body.innerHTML = '<div class="empty">No tokens yet.</div>';
    return;
  }
  const rows = tokens.map(t => {
    const st = tokenStatus(t);
    const issued  = new Date(t.issued_at).toLocaleString('en-GB');
    const expires = new Date(t.expires_at).toLocaleString('en-GB');
    const usedRevoked = t.revoked_at ? `revoked ${new Date(t.revoked_at).toLocaleString('en-GB')}`
                      : t.used_at   ? `used ${new Date(t.used_at).toLocaleString('en-GB')}`
                      : '';
    const canRevoke = (st === 'active' || st === 'pending');
    return `
      <tr>
        <td><span class="pill ${st}">${st}</span></td>
        <td>${escapeHtml(t.candidate_label || '')}</td>
        <td class="mono">${escapeHtml(t.token)}</td>
        <td>${issued}</td>
        <td>${expires}</td>
        <td style="color:var(--w-muted);font-size:0.82rem;">${usedRevoked}</td>
        <td>${canRevoke ? `<button class="btn danger small" onclick="revokeToken('${escapeHtml(t.token)}')">Revoke</button>` : ''}</td>
      </tr>
    `;
  }).join('');
  body.innerHTML = `
    <table>
      <thead><tr>
        <th>Status</th><th>Candidate</th><th>Token</th><th>Issued</th><th>Expires</th><th>Activity</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

async function revokeToken(token) {
  if (!confirm(`Revoke ${token}? This cannot be undone.`)) return;
  const r = await api('/cyborg/revoke', { method: 'POST', body: JSON.stringify({ token }) });
  const status = document.getElementById('list-status');
  if (r.ok) {
    status.className = 'status ok'; status.textContent = `Revoked ${token}.`;
    setTimeout(() => { status.className = 'status'; }, 3000);
    loadTokens();
  } else {
    const d = await r.json().catch(() => ({}));
    status.className = 'status err'; status.textContent = d.error || d.reason || `Error (${r.status}).`;
  }
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

let currentModal = { submissionId: null, tier: null, label: null };

function openReportModal(submissionId, tier, label) {
  currentModal = { submissionId, tier, label };
  document.getElementById('rm-meta').textContent = `${label} · submission #${submissionId}`;
  document.getElementById('report-modal').classList.remove('hidden');
  switchTier(tier);
  document.addEventListener('keydown', onEscClose);
}

function closeReportModal(ev) {
  if (ev && ev.target.id !== 'report-modal') return;
  document.getElementById('report-modal').classList.add('hidden');
  document.getElementById('rm-iframe').src = 'about:blank';
  document.removeEventListener('keydown', onEscClose);
}

function onEscClose(e) {
  if (e.key === 'Escape') closeReportModal();
}

function switchTier(tier) {
  currentModal.tier = tier;
  document.querySelectorAll('#rm-tabs .rm-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tier === tier);
  });
  const url = `/cyborg/admin/report?submission=${encodeURIComponent(currentModal.submissionId)}&tier=${encodeURIComponent(tier)}`;
  document.getElementById('rm-iframe').src = url;
}

async function loadReports() {
  const s = document.getElementById('reports-status');
  s.className = 'status'; s.textContent = 'Loading…';
  let r;
  try {
    r = await api('/cyborg/admin/reports', { method: 'GET' });
  } catch (e) {
    s.className = 'status err';
    s.textContent = `Network error: ${e.message || e}`;
    return;
  }
  if (!r.ok) {
    const d = await r.json().catch(() => ({}));
    s.className = 'status err';
    s.textContent = d.error || d.reason || `Error (${r.status}). Open browser console for details.`;
    return;
  }
  s.className = 'status'; s.textContent = '';
  renderReports(await r.json());
}

function renderReports(payload) {
  const reports = (payload && payload.reports) || [];
  const body = document.getElementById('reports-body');
  if (reports.length === 0) {
    body.innerHTML = '<div class="empty">No scored sessions yet.</div>';
    return;
  }
  const rows = reports.map(r => {
    const scored = r.scored_at ? new Date(r.scored_at).toLocaleString('en-GB') : '—';
    const cost   = r.cost_usd != null ? `$${Number(r.cost_usd).toFixed(4)}` : '—';
    const dur    = r.duration_ms != null ? `${(r.duration_ms/1000).toFixed(1)}s` : '—';
    const statusPill = `<span class="pill ${r.status}">${escapeHtml(r.status)}</span>`;
    const verdictPill = r.verdict
      ? `<span class="verdict-pill ${r.verdict}">${escapeHtml(r.verdict)}</span>`
      : '—';
    const labelOrToken = r.candidate_label
      ? `<strong>${escapeHtml(r.candidate_label)}</strong><br><code style="font-size:0.74rem;color:var(--w-muted);">${escapeHtml(r.candidate_token)}</code>`
      : `<code>${escapeHtml(r.candidate_token)}</code>`;
    const tiers = ['candidate','manager','technical','recruiter','master'];
    const links = tiers
      .map(t => `<button class="tier-link" onclick="openReportModal(${r.submission_id}, '${t}', '${escapeHtml(r.candidate_label || r.candidate_token)}')">${t}</button>`)
      .join('');
    const errCell = r.error
      ? `<div style="color:#bf2600;font-size:0.78rem;font-family:var(--c-mono);max-width:340px;overflow-wrap:break-word;">${escapeHtml(r.error)}</div>`
      : `<div class="headline-snippet">${escapeHtml(r.headline_snippet || '')}</div>`;
    return `
      <tr>
        <td>${statusPill}</td>
        <td>${labelOrToken}</td>
        <td>${scored}</td>
        <td>${dur}</td>
        <td>${cost}</td>
        <td>${verdictPill}</td>
        <td class="report-links">${links}</td>
      </tr>
      <tr><td colspan="7" style="padding-top:0;padding-bottom:14px;">${errCell}</td></tr>
    `;
  }).join('');
  body.innerHTML = `
    <table>
      <thead><tr>
        <th>Status</th><th>Candidate</th><th>Scored</th><th>Duration</th>
        <th>Cost</th><th>Verdict</th><th>View</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}
</script>

<style>.hidden { display: none !important; }</style>

</body>
</html>
